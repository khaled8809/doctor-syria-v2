{% extends 'base.html' %}
{% load static %}

{% block title %}تقويم المواعيد{% endblock %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/@fullcalendar/core/main.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/@fullcalendar/daygrid/main.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid/main.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/@fullcalendar/list/main.css" rel="stylesheet" />
<style>
    .fc-event {
        cursor: pointer;
    }
    .fc-event-pending { background-color: #ffc107; border-color: #ffc107; }
    .fc-event-confirmed { background-color: #28a745; border-color: #28a745; }
    .fc-event-cancelled { background-color: #dc3545; border-color: #dc3545; }
    .fc-event-completed { background-color: #6c757d; border-color: #6c757d; }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row mb-4">
        <div class="col">
            <div class="d-flex justify-content-between align-items-center">
                <h1>تقويم المواعيد</h1>
                <div>
                    <a href="{% url 'appointments:create' %}" class="btn btn-primary">
                        <i class="fas fa-plus me-2"></i>حجز موعد جديد
                    </a>
                    <a href="{% url 'appointments:list' %}" class="btn btn-secondary">
                        <i class="fas fa-list me-2"></i>عرض القائمة
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <div class="card">
                <div class="card-body">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="appointmentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">تفاصيل الموعد</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="appointmentDetails"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
                <a href="#" id="viewAppointmentBtn" class="btn btn-primary">عرض التفاصيل الكاملة</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/daygrid/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/timegrid/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/list/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/interaction/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        plugins: ['dayGrid', 'timeGrid', 'list', 'interaction'],
        header: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
        },
        locale: 'ar',
        direction: 'rtl',
        navLinks: true,
        editable: false,
        eventLimit: true,
        events: {{ calendar_events|safe }},
        eventClick: function(info) {
            var event = info.event;
            var modal = new bootstrap.Modal(document.getElementById('appointmentModal'));
            
            // تحديث محتوى النافذة المنبثقة
            var detailsHtml = `
                <dl class="row">
                    <dt class="col-sm-4">المريض:</dt>
                    <dd class="col-sm-8">${event.title}</dd>
                    
                    <dt class="col-sm-4">التاريخ:</dt>
                    <dd class="col-sm-8">${moment(event.start).format('YYYY-MM-DD HH:mm')}</dd>
                    
                    <dt class="col-sm-4">الحالة:</dt>
                    <dd class="col-sm-8">
                        <span class="badge bg-${getStatusColor(event.extendedProps.status)}">
                            ${getStatusText(event.extendedProps.status)}
                        </span>
                    </dd>
                </dl>
            `;
            document.getElementById('appointmentDetails').innerHTML = detailsHtml;
            
            // تحديث رابط عرض التفاصيل
            document.getElementById('viewAppointmentBtn').href = `/appointments/${event.id}/`;
            
            modal.show();
        }
    });

    calendar.render();
});

function getStatusColor(status) {
    const colors = {
        'pending': 'warning',
        'confirmed': 'success',
        'cancelled': 'danger',
        'completed': 'secondary'
    };
    return colors[status] || 'primary';
}

function getStatusText(status) {
    const texts = {
        'pending': 'قيد الانتظار',
        'confirmed': 'مؤكد',
        'cancelled': 'ملغي',
        'completed': 'مكتمل'
    };
    return texts[status] || status;
}
</script>
{% endblock %}
