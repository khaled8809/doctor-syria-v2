sonar.projectKey=khaled8809_doctor-syria-v2
sonar.organization=khaled8809

# معلومات المشروع
sonar.projectName=Doctor Syria V2
sonar.projectVersion=1.0

# مسارات المصدر
sonar.sources=.
sonar.exclusions=**/tests/**,**/migrations/**,**/__pycache__/**,**/venv/**,**/static/**,**/media/**
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.9

# التكوين
sonar.sourceEncoding=UTF-8
sonar.python.pylint=/usr/local/bin/pylint
sonar.python.pylint_config=.pylintrc

# تحليل الجودة
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml
sonar.python.flake8.reportPaths=flake8-report.txt
