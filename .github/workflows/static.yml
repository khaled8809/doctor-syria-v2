name: GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django whitenoise

      - name: Create static directory
        run: mkdir -p staticfiles

      - name: Create base HTML
        run: |
          echo '<!DOCTYPE html><html><head><title>Doctor Syria</title></head><body><h1>Doctor Syria Platform</h1><p>Coming Soon...</p></body></html>' > staticfiles/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staticfiles

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
