name: GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django whitenoise pillow psycopg2-binary

      - name: Create static directory
        run: mkdir -p staticfiles

      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: doctor_syria.settings.production
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: 'False'
          ALLOWED_HOSTS: '*'
        run: |
          python manage.py collectstatic --noinput --clear

      - name: Create custom index
        run: |
          cat > staticfiles/index.html << 'EOL'
          <!DOCTYPE html>
          <html dir="rtl" lang="ar">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>منصة طبيب سوريا</title>
              <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
              <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
              <style>
                  body {
                      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans", "Liberation Sans", Arial, sans-serif;
                      background-color: #f8f9fa;
                  }
                  .hero {
                      background: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
                      color: white;
                      padding: 4rem 0;
                  }
                  .feature-icon {
                      font-size: 2rem;
                      color: #0d6efd;
                      margin-bottom: 1rem;
                  }
              </style>
          </head>
          <body>
              <div class="hero text-center">
                  <div class="container">
                      <h1 class="display-4 fw-bold mb-3">منصة طبيب سوريا</h1>
                      <p class="lead mb-4">نظام متكامل لإدارة المستشفيات والعيادات الطبية</p>
                      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                          <button type="button" class="btn btn-light btn-lg px-4 gap-3">ابدأ الآن</button>
                          <button type="button" class="btn btn-outline-light btn-lg px-4">تعرف علينا</button>
                      </div>
                  </div>
              </div>

              <div class="container py-5">
                  <div class="row g-4 py-5 row-cols-1 row-cols-md-3">
                      <div class="col text-center">
                          <div class="feature-icon">
                              <i class="bi bi-hospital"></i>
                          </div>
                          <h3>إدارة المستشفيات</h3>
                          <p>نظام شامل لإدارة المستشفيات والمراكز الطبية بكفاءة عالية</p>
                      </div>
                      <div class="col text-center">
                          <div class="feature-icon">
                              <i class="bi bi-calendar-check"></i>
                          </div>
                          <h3>إدارة المواعيد</h3>
                          <p>جدولة وإدارة مواعيد المرضى بشكل سهل ومرن</p>
                      </div>
                      <div class="col text-center">
                          <div class="feature-icon">
                              <i class="bi bi-file-medical"></i>
                          </div>
                          <h3>السجلات الطبية</h3>
                          <p>حفظ وإدارة السجلات الطبية للمرضى بشكل آمن</p>
                      </div>
                  </div>
              </div>

              <footer class="bg-dark text-white text-center py-4">
                  <div class="container">
                      <p class="mb-0"> 2024 طبيب سوريا. جميع الحقوق محفوظة</p>
                  </div>
              </footer>

              <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
          </body>
          </html>
          EOL

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: staticfiles

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
