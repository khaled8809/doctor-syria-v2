---
# This workflow handles CI/CD for the Doctor Syria project
# Required secrets:
# - SONAR_TOKEN: Token for SonarCloud analysis
# - DOCKERHUB_USERNAME: DockerHub username for image publishing
# - DOCKERHUB_TOKEN: DockerHub access token for authentication

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: doctor_syria_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: doctor_syria.settings.test
          DB_NAME: doctor_syria_test
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          REDIS_HOST: localhost
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html

      - name: SonarCloud Scan
        # Requires SONAR_TOKEN to be set in repository secrets
        if: secrets.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      - name: Run linters
        run: |
          black . --check
          flake8 .
          isort . --check-only --diff

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run security checks
        run: |
          bandit -r . -x ./tests,./venv
          safety check

  build:
    needs: [test, lint, security]
    runs-on: ubuntu-latest
    # Only run on main branch and when DockerHub credentials are available
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.DOCKERHUB_USERNAME != '' &&
      secrets.DOCKERHUB_TOKEN != ''
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/doctor-syria:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/doctor-syria:${{ github.sha }}
          cache-from: >-
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/doctor-syria:buildcache
          cache-to: >-
            type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/doctor-syria:buildcache,mode=max
