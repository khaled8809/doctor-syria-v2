services:
  - type: web
    name: doctor-syria
    env: docker
    dockerfilePath: ./Dockerfile.prod
    healthCheckPath: /health/
    region: frankfurt
    plan: free
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doctor-syria-db
          property: connectionString
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: "https://doctor-syria.onrender.com"
      - key: REACT_APP_API_URL
        value: "https://doctor-syria.onrender.com"
      - key: REACT_APP_ENV
        value: "production"

databases:
  - name: doctor-syria-db
    databaseName: doctor_syria
    plan: free
    region: frankfurt
